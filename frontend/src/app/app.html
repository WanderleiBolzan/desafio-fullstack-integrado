<hr>
<h3>Realizar Transferência</h3>
<div style="display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px;">

  <label>ID Origem:</label>
  <input type="number"
         [value]="idDeInput()"
         (input)="idDeInput.set($any($event.target).value)"
         [disabled]="loading()">

  <label>ID Destino:</label>
  <input type="number"
         [value]="idParaInput()"
         (input)="idParaInput.set($any($event.target).value)"
         [disabled]="loading()">

  <label>Valor (R$):</label>
  <input type="number"
         [value]="valorInput()"
         (input)="valorInput.set($any($event.target).value)"
         [disabled]="loading()">

  <button
    (click)="transferir()"
    [disabled]="!formularioValido() || loading()"
    [style.backgroundColor]="(!formularioValido() || loading()) ? '#ccc' : '#28a745'"
    style="color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s;">

    {{ loading() ? 'Processando...' : 'Confirmar Transferência' }}
  </button>

  @if (!formularioValido() && !loading()) {
  <p style="color: #d9534f; font-size: 0.8em; margin: 0;">
    * Preencha IDs válidos e valor maior que zero para liberar.
  </p>
  }
</div>
