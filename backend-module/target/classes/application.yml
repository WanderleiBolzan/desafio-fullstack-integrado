spring:
  application:
    name: backend-module

  datasource:
    # Configuração do Banco em Memória H2
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      # Permite acessar http://localhost:8080/h2-console
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

  jpa:
    # Define o dialeto para H2
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # 'update' cria as tabelas automaticamente baseadas nas suas entidades
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080